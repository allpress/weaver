; Default settings applied to every newly-created context.
; Per-context overrides live in contexts/<name>/config/context.ini.

[context]
display_name = Untitled Context
active = false

[sources]
; Pluggable providers enabled for this context. Leave blank until configured.
source_control =
issue_tracker =
wiki =
log_search =

[source_control]
; GitLab / GitHub base URL and namespace. Configure via CLI.
base_url =
group_or_owner =
clone_protocol = https

[rag]
; Override global RAG settings here if needed.

[graph]
; Override global graph settings here if needed.

[auth.providers.gitlab]
; allow_playwright_scrape = false
; playwright_scrape_reason =

[auth.providers.github]
; allow_playwright_scrape = false

[auth.providers.confluence]
; allow_playwright_scrape = false
